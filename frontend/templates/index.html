<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Chatbot Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="chatbot">
            <div class="chat_header">
                <h3>
                    <span>🎓</span>
                    University Assistant
                </h3>
                <span class="status">Online</span>
            </div>
            <div class="chat_messages" id="messages">
                <!-- Messages will appear here -->
            </div>
            <div class="typing_indicator" id="typingIndicator" style="display: none;">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="chat_input">
            <input type="text" id="userInput" placeholder="Type your query..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
            <button onclick="clearChat()" class="clear-btn">Clear</button>
        </div>

        <div class="suggested-questions">
            <button onclick="quickQuestion('admission process')">📝 Admission</button>
            <button onclick="quickQuestion('exam schedule')">📅 Exams</button>
            <button onclick="quickQuestion('fee structure')">💰 Fees</button>
            <button onclick="quickQuestion('hostel facilities')">🏠 Hostel</button>
            <button onclick="quickQuestion('scholarship')">🎯 Scholarship</button>
            <button onclick="quickQuestion('placement')">💼 Placement</button>
            <button onclick="quickQuestion('menu')">📋 Menu</button>
        </div>
    </div>

    <script type="module" src="/static/script.js"></script>
</body>
</html>
