<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Chatbot Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: 20px auto;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            background: white;
            overflow: hidden;
        }

        .chatbot {
            background: #f8f9fa;
            height: 500px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat_header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .chat_header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status {
            background: #28a745;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .chat_messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f8f9fa;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            margin-bottom: 5px;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .message.bot {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .timestamp {
            font-size: 0.65rem;
            margin-top: 5px;
            opacity: 0.7;
            text-align: right;
        }

        .message.bot .timestamp {
            color: #666;
        }

        .message.user .timestamp {
            color: rgba(255,255,255,0.8);
        }

        .typing_indicator {
            display: flex;
            gap: 5px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            width: fit-content;
            margin: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-bottom-left-radius: 5px;
        }

        .typing_indicator span {
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            animation: typing 1.5s infinite ease-in-out;
        }

        .typing_indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing_indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .chat_input {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: white;
            border-top: 1px solid #dee2e6;
        }

        .chat_input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .chat_input input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .chat_input input::placeholder {
            color: #adb5bd;
        }

        .chat_input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .chat_input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .chat_input button:active {
            transform: translateY(0);
        }

        .clear-btn {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%) !important;
            padding: 12px 20px !important;
        }

        .clear-btn:hover {
            box-shadow: 0 5px 15px rgba(245, 101, 101, 0.4) !important;
        }

        .suggested-questions {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e9ecef;
            flex-wrap: wrap;
        }

        .suggested-questions button {
            padding: 8px 16px;
            background: #f1f3f5;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #495057;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid transparent;
        }

        .suggested-questions button:hover {
            background: #e9ecef;
            transform: translateY(-2px);
            border-color: #667eea;
        }

        .suggested-questions button:active {
            transform: translateY(0);
        }

        /* Scrollbar styling */
        .chat_messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat_messages::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat_messages::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
        }

        .chat_messages::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        /* Welcome message styling */
        .welcome-message {
            text-align: center;
            color: #6c757d;
            padding: 20px;
            font-style: italic;
        }

        /* Responsive design */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .container {
                margin: 10px auto;
            }
            
            .chatbot {
                height: 450px;
            }
            
            .message {
                max-width: 90%;
            }
            
            .suggested-questions button {
                padding: 6px 12px;
                font-size: 0.8rem;
            }
            
            .chat_input button {
                padding: 12px 16px;
            }
        }
    </style>
</head>

        let conversationHistory = [];

        // Add message to chat
        function addMessage(text, sender) {
            const messages = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            // Format message with line breaks
            const formattedText = text.replace(/\n/g, '<br>');
            
            messageDiv.innerHTML = `
                <div>${formattedText}</div>
                <div class="timestamp">${time}</div>
            `;
            
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
            
            conversationHistory.push({
                text: text,
                sender: sender,
                time: time
            });
        }

        // Show/hide typing indicator
        function showTypingIndicator(show) {
            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = show ? 'flex' : 'none';

            // Check for roll number based grade
            if (userInput.includes('roll no') || userInput.match(/\d{10}/)) {
                return "🔍 To check your grades:\n\n1. Visit student portal (results.university.edu)\n2. Login with your credentials\n3. Click on 'Results' section\n4. Select your course and semester\n5. Enter roll number\n6. Download/print result\n\nNeed help?\n• Forgot password: Click 'Forgot Password'\n• IT Support: it@university.edu\n• Exam Cell: exams@university.edu\n\nSMS Service: Type RESULT <ROLLNO> to 56789";
            }
            
            // Check for date/time queries
            if (userInput.includes('today') || userInput.includes('date') || userInput.includes('day')) {
                const today = new Date();
                const options = { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                };
                return `📅 Today is ${today.toLocaleDateString('en-IN', options)}`;
            }
            
            // Check for time query
            if (userInput.includes('time') || userInput.includes('clock')) {
                const time = new Date().toLocaleTimeString('en-IN', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                return `🕐 Current time is ${time}`;
            }
            
            // Check for thanks
            if (userInput.includes('thank')) {
                return responses['thanks|thank you|thank'];
            }
            
            // Check for bye
            if (userInput.includes('bye') || userInput.includes('goodbye')) {
                return responses['bye|goodbye|see you'];
            }
            
            // Check for menu/help
            if (userInput === 'menu' || userInput === 'help' || userInput === 'options' || userInput === 'commands') {
                return responses['menu|help|options|what can you do|commands'];
            }
            
            // Check all response patterns
            for (let key in responses) {
                const patterns = key.split('|');
                for (let pattern of patterns) {
                    if (userInput.includes(pattern)) {
                        return responses[key];
                    }
                }
            }
            
            return responses['default'];
        }

        // Send message function
        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            // Add user message
            addMessage(text, 'user');
            input.value = '';
            
            // Show typing indicator
            showTypingIndicator(true);
            
            // Simulate bot typing delay
            setTimeout(() => {
                // Get and add bot response
                const response = getBotResponse(text);
                addMessage(response, 'bot');
                showTypingIndicator(false);
            }, 1000);
        }

        // Quick question button
        function quickQuestion(question) {
            document.getElementById('userInput').value = question;
            sendMessage();
        }

        // Clear chat history
        function clearChat() {
            if (confirm('Are you sure you want to clear the chat history?')) {
                document.getElementById('messages').innerHTML = '';
                conversationHistory = [];
                // Add welcome message
                setTimeout(() => {
                    addMessage('👋 Chat cleared! How can I help you today? Type "menu" to see options.', 'bot');
                }, 100);
            }
        }

        // Handle Enter key
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Load chat with welcome message on page load
        window.onload = function() {
            addMessage('👋 Hello! I\'m your University Assistant. I can help you with admissions, courses, exams, fees, scholarships, and more! Type "menu" to see all options or select from the suggested questions below.', 'bot');
            
            // Focus on input
            document.getElementById('userInput').focus();
        }

        // Add some CSS animations for new messages
        const style = document.createElement('style');
        style.textContent = `
            .message {
                animation: slideIn 0.3s ease-out;
            }
            
            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            
            .message.bot {
                background: white;
                border: 1px solid #e9ecef;
            }
            
            .message.bot br {
                content: "";
                margin: 1em;
                display: block;
                font-size: 24%;
            }
            
            .message.bot strong {
                color: #667eea;
            }
            
            .message.user strong {
                color: #fff;
                opacity: 0.9;
            }
            
            /* Responsive fixes */
            @media (max-width: 480px) {
                .message {
                    max-width: 95%;
                    font-size: 0.9rem;
                }
                
                .chat_input {
                    flex-wrap: wrap;
                }
                
                .chat_input button {
                    flex: 1;
                }
                
                .suggested-questions {
                    justify-content: center;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
